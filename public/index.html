<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131311">
<title>TradingAgents 研究终端</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23131311'/><text x='6' y='23' font-family='Georgia' font-size='18' fill='%23d9a441'>Ta</text></svg>">
<style>
  :root {
    --ink: #131311;          /* 墨底 */
    --ink-2: #1a1a17;        /* 面板 */
    --ink-3: #21211c;        /* 悬停 */
    --paper: #e7e2d3;        /* 旧纸白 */
    --paper-dim: #8d887a;    /* 灰纸 */
    --hair: #2e2d27;         /* 发丝线 */
    --amber: #d9a441;        /* 强调 */
    --buy: #7fb389;
    --hold: #b8a355;
    --sell: #c96a5f;
    --serif: Georgia, "Times New Roman", "Songti SC", "STSong", "SimSun", serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, "Courier New", monospace;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--ink); color: var(--paper);
    font-family: var(--mono); font-size: 13px; line-height: 1.6;
    font-variant-numeric: tabular-nums;
  }
  ::selection { background: var(--amber); color: var(--ink); }

  /* ── 刊头 ─────────────────────────────── */
  .masthead {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    padding: 14px 20px 12px; border-bottom: 1px solid var(--hair);
  }
  .wordmark { font-family: var(--serif); font-size: 21px; letter-spacing: .02em; }
  .wordmark i { color: var(--amber); font-style: normal; }
  .wordmark small { font-size: 12px; color: var(--paper-dim); margin-left: 10px; letter-spacing: .12em; }
  .masthead .meta { font-size: 11px; color: var(--paper-dim); text-align: right; white-space: nowrap; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
         background: var(--paper-dim); margin-right: 5px; vertical-align: 1px; }
  .dot.live { background: var(--buy); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }

  /* ── 骨架 ─────────────────────────────── */
  .frame { display: grid; grid-template-columns: 300px minmax(0, 1fr); min-height: calc(100vh - 54px); }
  .rail { border-right: 1px solid var(--hair); }
  .rail section { padding: 14px 16px 16px; border-bottom: 1px solid var(--hair); }
  .rail h2, .main h2 {
    margin: 0 0 10px; font-size: 11px; font-weight: 400; color: var(--paper-dim);
    text-transform: uppercase; letter-spacing: .22em;
  }
  .main { padding: 18px 22px calc(120px + env(safe-area-inset-bottom)); min-width: 0; }

  /* ── 表单 ─────────────────────────────── */
  input, button, textarea {
    font-family: var(--mono); font-size: 13px; color: var(--paper);
    background: var(--ink-2); border: 1px solid var(--hair); border-radius: 0;
    padding: 8px 10px; outline: none;
  }
  input:focus, textarea:focus { border-color: var(--amber); }
  input::placeholder { color: #565349; }
  .field { margin-bottom: 8px; }
  .field label { display: block; font-size: 11px; color: var(--paper-dim); margin-bottom: 4px;
                 letter-spacing: .08em; }
  .field input { width: 100%; }
  button.go {
    width: 100%; cursor: pointer; border-color: var(--amber); color: var(--amber);
    background: transparent; letter-spacing: .3em; padding: 9px 0 8px; transition: all .12s;
  }
  button.go:hover:not(:disabled) { background: var(--amber); color: var(--ink); }
  button.go:disabled { opacity: .45; cursor: default; }
  .hint { font-size: 11px; color: var(--paper-dim); margin-top: 8px; line-height: 1.7; }
  .hint code { color: var(--paper); }
  .notice { font-size: 12px; margin-top: 8px; min-height: 18px; }
  .notice.err { color: var(--sell); }
  .notice.ok { color: var(--buy); }

  /* ── 运行 / 档案列表 ───────────────────── */
  .runs, .arch { display: flex; flex-direction: column; }
  .row {
    display: flex; gap: 8px; align-items: baseline; padding: 7px 2px;
    border-bottom: 1px dotted #24231e; cursor: pointer; text-decoration: none; color: var(--paper);
  }
  .row:last-child { border-bottom: 0; }
  .row:hover { background: var(--ink-3); }
  .row .when { color: var(--paper-dim); font-size: 11px; min-width: 74px; }
  .row .what { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .row.active .when { color: var(--amber); }
  .r-buy { color: var(--buy); } .r-sell { color: var(--sell); } .r-hold { color: var(--hold); }
  .r-ow { color: var(--buy); } .r-uw { color: var(--sell); } .r-err { color: var(--sell); }

  /* ── 结果区 ────────────────────────────── */
  .dateline { font-family: var(--serif); font-size: 24px; margin: 2px 0 2px; }
  .dateline small { font-family: var(--mono); font-size: 11px; color: var(--paper-dim); margin-left: 12px; letter-spacing: .1em; }
  .tickers { display: flex; flex-wrap: wrap; gap: 0; margin: 12px 0 0; border: 1px solid var(--hair); }
  .tk {
    padding: 9px 16px 8px; border-right: 1px solid var(--hair); cursor: pointer;
    background: var(--ink-2); transition: background .12s; min-width: 118px;
  }
  .tk:hover { background: var(--ink-3); }
  .tk.on { background: var(--ink); box-shadow: inset 0 -2px 0 var(--amber); }
  .tk .sym { font-size: 13px; letter-spacing: .04em; }
  .tk .rat { font-size: 15px; margin-top: 1px; }
  .tk .rat.small { font-size: 11px; color: var(--sell); }

  .tabs { display: flex; flex-wrap: wrap; gap: 14px; margin: 16px 0 0; border-bottom: 1px solid var(--hair); }
  .tab { padding: 4px 1px 7px; font-size: 12px; color: var(--paper-dim); cursor: pointer;
         border-bottom: 2px solid transparent; margin-bottom: -1px; letter-spacing: .06em; }
  .tab:hover { color: var(--paper); }
  .tab.on { color: var(--amber); border-bottom-color: var(--amber); }

  /* ── 阅读器（衬线正文）─────────────────── */
  .article { max-width: 760px; padding: 20px 0 8px; font-family: var(--serif);
             font-size: 15.5px; line-height: 1.95; }
  .article .placeholder { color: var(--paper-dim); font-family: var(--mono); font-size: 12px; }
  .article h1 { font-size: 22px; font-weight: 600; margin: 4px 0 14px; }
  .article h2 { font-size: 18px; font-weight: 600; margin: 26px 0 10px;
                padding-bottom: 6px; border-bottom: 1px solid var(--hair); }
  .article h3 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; color: var(--amber); }
  .article h4 { font-size: 15px; margin: 14px 0 6px; }
  .article p { margin: 9px 0; }
  .article b { color: #f2edda; }
  .article ul, .article ol { padding-left: 22px; margin: 8px 0; }
  .article li { margin: 3px 0; }
  .article blockquote { border-left: 2px solid var(--amber); margin: 12px 0; padding: 2px 14px;
                        color: var(--paper-dim); }
  .article hr { border: 0; border-top: 1px solid var(--hair); margin: 18px 0; }
  .article code { font-family: var(--mono); font-size: 12.5px; background: var(--ink-2);
                  border: 1px solid var(--hair); padding: 1px 5px; }
  .article pre { font-family: var(--mono); font-size: 12.5px; background: var(--ink-2);
                 border: 1px solid var(--hair); padding: 12px; overflow-x: auto; line-height: 1.6; }
  .article pre code { border: 0; padding: 0; background: none; }
  .article table { border-collapse: collapse; margin: 12px 0; font-family: var(--mono);
                   font-size: 12.5px; display: block; overflow-x: auto; max-width: 100%; }
  .article th, .article td { border: 1px solid var(--hair); padding: 6px 10px; text-align: left; }
  .article th { color: var(--paper-dim); font-weight: 400; background: var(--ink-2);
                letter-spacing: .05em; }
  .article a { color: var(--amber); }

  /* ── 问答 dock ─────────────────────────── */
  .dock {
    position: fixed; left: 300px; right: 0; bottom: 0; z-index: 30;
    border-top: 1px solid var(--hair); background: var(--ink);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .dock .log { display: none; max-height: 42vh; overflow-y: auto; padding: 12px 20px 4px; }
  .dock.open .log { display: block; }
  .msg { margin: 0 0 12px; max-width: 780px; }
  .msg .who { font-size: 10px; color: var(--paper-dim); letter-spacing: .2em; margin-bottom: 3px; }
  .msg.user .body { color: var(--amber); }
  .msg .body { font-size: 13px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
  .dock form { display: flex; gap: 0; padding: 10px 20px; }
  .dock .prompt { color: var(--amber); padding: 8px 10px 8px 0; user-select: none; }
  .dock input { flex: 1; background: transparent; border: 0; border-bottom: 1px solid var(--hair);
                padding: 8px 2px; }
  .dock input:focus { border-bottom-color: var(--amber); }
  .dock button { margin-left: 12px; cursor: pointer; border-color: var(--hair); color: var(--paper-dim);
                 background: transparent; padding: 8px 14px; transition: all .12s; }
  .dock button:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
  .dock button:disabled { opacity: .4; cursor: default; }
  .dock .ctx { font-size: 10px; color: var(--paper-dim); padding: 0 20px 8px; letter-spacing: .05em; }

  .foot { font-size: 11px; color: #565349; padding: 26px 0 8px; line-height: 1.8; }
  .foot a { color: var(--paper-dim); }

  /* ── 移动端 ────────────────────────────── */
  @media (max-width: 920px) {
    .frame { grid-template-columns: 1fr; }
    .rail { border-right: 0; border-bottom: 1px solid var(--hair); }
    .rail section.collapsible > h2 { cursor: pointer; margin: 0; padding: 2px 0; }
    .main { padding: 16px 16px calc(130px + env(safe-area-inset-bottom)); }
    .dock { left: 0; }
    .dateline { font-size: 20px; }
    .article { font-size: 15px; }
    .tk { min-width: 0; flex: 1 1 auto; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="wordmark">Trading<i>Agents</i><small>多智能体研究终端</small></div>
  <div class="meta"><span id="live-dot" class="dot"></span><span id="masthead-meta">载入中</span></div>
</div>

<div class="frame">
  <aside class="rail">
    <section>
      <h2>发起分析</h2>
      <div class="field">
        <label>标的 · 美股代码或A股六位数字，逗号分隔</label>
        <input id="f-tickers" placeholder="NVDA, 600519, 510050" autocomplete="off">
      </div>
      <div class="field">
        <label>访问码</label>
        <input id="f-code" type="password" placeholder="········" autocomplete="off">
      </div>
      <button class="go" id="f-go">执 行</button>
      <div class="notice" id="f-notice"></div>
      <div class="hint">提交后由 GitHub Actions 运行完整多智能体链路（分析师→辩论→交易员→风控→基金经理），
约 5–20 分钟；完成后微信推送、本页自动更新。A股六位代码自动补市场后缀。</div>
    </section>
    <section>
      <h2>运行</h2>
      <div class="runs" id="runs"><div class="hint">—</div></div>
    </section>
    <section>
      <h2>档案</h2>
      <div class="arch" id="arch"><div class="hint">—</div></div>
    </section>
  </aside>

  <main class="main">
    <div class="dateline"><span id="d-date">—</span><small id="d-meta"></small></div>
    <div class="tickers" id="tickers"></div>
    <div class="tabs" id="tabs"></div>
    <article class="article" id="article">
      <div class="placeholder">选择标的与报告分卷。</div>
    </article>
    <div class="foot">
      TradingAgents · Tauric Research（Apache-2.0）· fork
      <a href="https://github.com/gaaiyun/TradingAgents" target="_blank" rel="noopener">gaaiyun/TradingAgents</a>
      · 大模型研究输出，不构成投资建议
    </div>
  </main>
</div>

<div class="dock" id="dock">
  <div class="ctx" id="dock-ctx"></div>
  <div class="log" id="dock-log"></div>
  <form id="dock-form">
    <span class="prompt">?</span>
    <input id="dock-q" placeholder="就当前报告提问，例如：这份报告最大的风险点是什么" autocomplete="off">
    <button id="dock-go" type="submit">问</button>
  </form>
</div>

<script>
"use strict";
/* ── 工具 ─────────────────────────────────── */
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const RATING_CLS = { "Buy":"r-buy","Overweight":"r-ow","Hold":"r-hold","Underweight":"r-uw","Sell":"r-sell" };
const RATING_CN  = { "Buy":"买入","Overweight":"增持","Hold":"持有","Underweight":"减持","Sell":"卖出" };
const FILE_LABEL = [
  ["decision","投资决策"],["complete_report","完整报告"],["market","市场技术"],
  ["news","新闻"],["fundamentals","基本面"],["sentiment","情绪"],
  ["bull","多方"],["bear","空方"],["manager","研究经理"],["trader","交易员"],
  ["aggressive","风控·激进"],["conservative","风控·保守"],["neutral","风控·中性"],
];

/* 数据获取：优先走 Functions 实时代理，失败回退静态文件 */
async function fetchData(api, fallback) {
  for (const url of [api, fallback]) {
    try {
      const r = await fetch(url + (url.includes("?") ? "&" : "?") + "ts=" + Date.now(), { cache: "no-store" });
      if (r.ok) return await (url.endsWith(".md") || api.includes("/report") ? r.text() : r.json());
    } catch (e) { /* 下一个 */ }
  }
  throw new Error("数据不可用");
}

/* ── Markdown 渲染 ────────────────────────── */
function mdRender(src) {
  src = String(src).replace(/\r\n/g, "\n");
  const fences = [];
  src = src.replace(/```([\s\S]*?)```/g, (_, c) =>
    (fences.push(`<pre><code>${esc(c.replace(/^\w*\n/, ""))}</code></pre>`), ` ␀F${fences.length-1}␀ `));
  src = esc(src);
  const inline = t => t
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, "")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<i>$2</i>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const lines = src.split("\n"), out = []; let i = 0, list = null, para = [];
  const fp = () => { if (para.length) { out.push(`<p>${inline(para.join(" "))}</p>`); para = []; } };
  const fl = () => { if (list) { out.push(`</${list}>`); list = null; } };
  while (i < lines.length) {
    const L = lines[i];
    const f = L.match(/␀F(\d+)␀/);
    if (f) { fp(); fl(); out.push(fences[+f[1]]); i++; continue; }
    if (/^\s*$/.test(L)) { fp(); fl(); i++; continue; }
    const h = L.match(/^(#{1,4})\s+(.*)/);
    if (h) { fp(); fl(); out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); i++; continue; }
    if (/^\s*(---+|\*\*\*+)\s*$/.test(L)) { fp(); fl(); out.push("<hr>"); i++; continue; }
    if (/^\s*&gt;\s?/.test(L)) { fp(); fl();
      out.push(`<blockquote>${inline(L.replace(/^\s*&gt;\s?/, ""))}</blockquote>`); i++; continue; }
    if (/^\s*\|.*\|\s*$/.test(L) && i+1 < lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])) {
      fp(); fl();
      const cells = r => r.trim().replace(/^\||\|$/g, "").split("|").map(c => inline(c.trim()));
      let html = "<table><thead><tr>" + cells(L).map(c=>`<th>${c}</th>`).join("") + "</tr></thead><tbody>";
      i += 2;
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
        html += "<tr>" + cells(lines[i]).map(c=>`<td>${c}</td>`).join("") + "</tr>"; i++;
      }
      out.push(html + "</tbody></table>"); continue;
    }
    const li = L.match(/^\s*(?:[-*+]|(\d+)\.)\s+(.*)/);
    if (li) { fp(); const want = li[1] ? "ol" : "ul";
      if (list !== want) { fl(); out.push(`<${want}>`); list = want; }
      out.push(`<li>${inline(li[2])}</li>`); i++; continue; }
    para.push(L.trim()); i++;
  }
  fp(); fl();
  return out.join("\n");
}

/* ── 状态 ─────────────────────────────────── */
const S = { latest: null, history: [], entry: null, ticker: null, file: null, chat: [] };
$("f-code").value = localStorage.getItem("ta_code") || "";

/* ── 结果渲染 ─────────────────────────────── */
function showEntry(entry, label) {
  S.entry = entry;
  $("d-date").textContent = entry?.trade_date || "—";
  $("d-meta").textContent = label || "";
  const box = $("tickers");
  const results = entry?.results || [];
  box.innerHTML = results.map((r, idx) => {
    const cls = r.error ? "r-err" : (RATING_CLS[r.rating] || "");
    const rat = r.error ? `<div class="rat small">失败</div>`
      : `<div class="rat ${cls}">${esc(r.rating || "—")}<span style="font-size:11px;color:var(--paper-dim)"> ${RATING_CN[r.rating] || ""}</span></div>`;
    return `<div class="tk" data-i="${idx}"><div class="sym">${esc(r.ticker)}</div>${rat}</div>`;
  }).join("") || `<div class="tk"><div class="sym" style="color:var(--paper-dim)">无结果</div></div>`;
  box.querySelectorAll(".tk[data-i]").forEach(el =>
    el.addEventListener("click", () => selectTicker(+el.dataset.i)));
  const firstOk = results.findIndex(r => !r.error);
  if (firstOk >= 0) selectTicker(firstOk);
  else { $("tabs").innerHTML = ""; $("article").innerHTML = `<div class="placeholder">该运行没有成功的标的。</div>`; }
}

function selectTicker(idx) {
  const r = (S.entry?.results || [])[idx];
  if (!r) return;
  S.ticker = r.ticker;
  document.querySelectorAll(".tk").forEach(el => el.classList.toggle("on", el.dataset.i == idx));
  const files = r.files || (r.report ? { complete_report: r.report } : {});
  const tabs = FILE_LABEL.filter(([k]) => files[k]);
  $("tabs").innerHTML = tabs.map(([k, lab]) =>
    `<div class="tab" data-k="${k}" data-p="${esc(files[k])}">${lab}</div>`).join("");
  $("tabs").querySelectorAll(".tab").forEach(el =>
    el.addEventListener("click", () => openFile(el.dataset.p, el)));
  const first = $("tabs").querySelector(".tab");
  if (first) openFile(first.dataset.p, first);
  else $("article").innerHTML = `<div class="placeholder">该标的没有报告文件（可能为旧数据）。</div>`;
}

async function openFile(path, tabEl) {
  document.querySelectorAll(".tab").forEach(el => el.classList.toggle("on", el === tabEl));
  S.file = path;
  $("dock-ctx").textContent = `对话上下文 → ${S.ticker || ""} · ${path.split("/").pop()}`;
  $("article").innerHTML = `<div class="placeholder">读取 ${esc(path)} …</div>`;
  try {
    const md = await fetchData(`/api/report?path=${encodeURIComponent(path)}`, `./${path}`);
    $("article").innerHTML = mdRender(md);
  } catch (e) {
    $("article").innerHTML = `<div class="placeholder">报告读取失败：${esc(e.message)}</div>`;
  }
}

/* ── 档案 ─────────────────────────────────── */
function renderArchive() {
  const box = $("arch");
  if (!S.history.length) { box.innerHTML = `<div class="hint">—</div>`; return; }
  box.innerHTML = S.history.slice(0, 30).map((h, i) => {
    const what = (h.results || []).map(r => {
      const cls = r.error ? "r-err" : (RATING_CLS[r.rating] || "");
      return `<span class="${cls}">${esc(r.ticker)}·${r.error ? "✕" : esc(r.rating || "?")}</span>`;
    }).join("  ");
    return `<div class="row" data-i="${i}"><span class="when">${esc(h.trade_date || "?")}</span><span class="what">${what}</span></div>`;
  }).join("");
  box.querySelectorAll(".row").forEach(el => el.addEventListener("click", () => {
    box.querySelectorAll(".row").forEach(r => r.classList.remove("active"));
    el.classList.add("active");
    showEntry(S.history[+el.dataset.i], "档案");
  }));
}

/* ── 运行状态 ─────────────────────────────── */
let pollTimer = null, hadActive = false;
async function refreshRuns() {
  try {
    const data = await fetchData("/api/runs", "/api/runs");
    const runs = data.runs || [];
    const active = runs.some(r => r.status !== "completed");
    $("live-dot").className = "dot" + (active ? " live" : "");
    $("runs").innerHTML = runs.slice(0, 6).map(r => {
      const t = new Date(r.created_at);
      const when = `${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")} ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;
      const mark = r.status !== "completed" ? `<span style="color:var(--amber)">运行中</span>`
        : (r.conclusion === "success" ? `<span style="color:var(--buy)">✓</span>` : `<span style="color:var(--sell)">✕</span>`);
      return `<a class="row" href="${esc(r.url)}" target="_blank" rel="noopener">
        <span class="when">${when}</span><span class="what">${esc(r.title)}</span>${mark}</a>`;
    }).join("") || `<div class="hint">—</div>`;
    if (hadActive && !active) loadData();   // 有运行刚结束 → 刷新结果
    hadActive = active;
    clearTimeout(pollTimer);
    pollTimer = setTimeout(refreshRuns, active ? 20000 : 90000);
  } catch (e) {
    $("runs").innerHTML = `<div class="hint">运行状态不可用（本地预览模式）</div>`;
  }
}

/* ── 发起分析 ─────────────────────────────── */
$("f-go").addEventListener("click", async () => {
  const tickers = $("f-tickers").value.trim();
  const code = $("f-code").value.trim();
  const notice = $("f-notice");
  if (!tickers) { notice.className = "notice err"; notice.textContent = "请填写标的代码"; return; }
  if (!code)    { notice.className = "notice err"; notice.textContent = "请填写访问码"; return; }
  localStorage.setItem("ta_code", code);
  $("f-go").disabled = true; notice.className = "notice"; notice.textContent = "提交中…";
  try {
    const r = await fetch("/api/analyze", { method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ tickers, code }) });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    notice.className = "notice ok"; notice.textContent = `已受理 ${data.tickers} · 约 5–20 分钟`;
    $("f-tickers").value = "";
    setTimeout(refreshRuns, 4000);
  } catch (e) {
    notice.className = "notice err"; notice.textContent = e.message;
  } finally { $("f-go").disabled = false; }
});

/* ── 问答 ─────────────────────────────────── */
function pushMsg(role, text) {
  S.chat.push({ role, content: text });
  const log = $("dock-log");
  const who = role === "user" ? "问" : "TradingAgents";
  log.insertAdjacentHTML("beforeend",
    `<div class="msg ${role}"><div class="who">${who}</div><div class="body">${esc(text)}</div></div>`);
  $("dock").classList.add("open");
  log.scrollTop = log.scrollHeight;
}
$("dock-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const q = $("dock-q").value.trim();
  const code = $("f-code").value.trim();
  if (!q) return;
  if (!code) { pushMsg("assistant", "请先在左栏填写访问码。"); return; }
  localStorage.setItem("ta_code", code);
  $("dock-q").value = ""; $("dock-go").disabled = true;
  pushMsg("user", q);
  const holder = document.createElement("div");
  holder.className = "msg assistant";
  holder.innerHTML = `<div class="who">TradingAgents</div><div class="body">…</div>`;
  $("dock-log").appendChild(holder); $("dock-log").scrollTop = 1e9;
  try {
    const r = await fetch("/api/chat", { method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ question: q, code, report: S.file || "", history: S.chat.slice(0, -1) }) });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    holder.querySelector(".body").textContent = data.answer || "（空回复）";
    S.chat.push({ role: "assistant", content: data.answer || "" });
  } catch (e) {
    holder.querySelector(".body").textContent = "出错：" + e.message;
  } finally {
    $("dock-go").disabled = false; $("dock-log").scrollTop = 1e9;
  }
});

/* ── 启动 ─────────────────────────────────── */
async function loadData() {
  try {
    const latest = await fetchData("/api/latest", "./data/latest.json");
    S.latest = latest;
    $("masthead-meta").textContent =
      `${latest.trade_date || "—"} · ${latest.provider || "?"} · ${(latest.generated_at || "").slice(0, 16)}`;
    if (latest.status === "unconfigured") {
      $("article").innerHTML = `<div class="placeholder">${esc(latest.hint || "等待配置")}</div>`;
    } else {
      showEntry(latest, "最新");
    }
  } catch (e) {
    $("masthead-meta").textContent = "数据不可用";
  }
  try {
    S.history = await fetchData("/api/history", "./data/history.json");
    renderArchive();
  } catch (e) { /* 可选 */ }
}
loadData();
refreshRuns();
</script>
</body>
</html>

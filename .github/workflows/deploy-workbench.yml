name: deploy-workbench

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - "functions/**"
      - "package.json"
      - ".github/workflows/deploy-workbench.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-workbench
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'tradingagents-board' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check deployment credentials
        id: cloudflare
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare credentials are not configured in this repository; use the VolGuard deploy-tradingagents workflow."
          fi

      - name: Test Pages Functions contracts
        run: npm run test:functions

      - name: Deploy workbench and Pages Functions
        if: ${{ steps.cloudflare.outputs.available == 'true' }}
        run: npx --yes wrangler@4.113.0 pages deploy public --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main

name: daily-analysis

run-name: >-
  Daily analysis · ${{ inputs.profileId || 'manual' }} · ${{ inputs.slotId || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "逗号分隔的股票代码（留空使用网页保存的每日清单）"
        required: false
        default: ""
      profileId:
        description: "Monitor Worker 研究配置 ID"
        required: false
        default: ""
      slotId:
        description: "Monitor Worker 确定性计划槽 ID"
        required: false
        default: ""
      scheduledFor:
        description: "Monitor Worker 原始计划时间（ISO 8601）"
        required: false
        default: ""

permissions:
  contents: write   # 分析报告与历史 commit 回 main 持久化
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    # 清单上限为 10，分析按标的顺序执行；为满清单预留足够时间。
    timeout-minutes: 240
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHONIOENCODING: utf-8
      TRADINGAGENTS_PROFILE_ID: ${{ inputs.profileId || '' }}
      TRADINGAGENTS_SLOT_ID: ${{ inputs.slotId || '' }}
      TRADINGAGENTS_SCHEDULED_FOR: ${{ inputs.scheduledFor || '' }}
      # ── LLM 后端（仓库 Variables 可覆盖）─────────────────────────
      TRADINGAGENTS_LLM_PROVIDER: ${{ vars.TRADINGAGENTS_LLM_PROVIDER || 'deepseek' }}
      TRADINGAGENTS_DEEP_THINK_LLM: ${{ vars.TRADINGAGENTS_DEEP_THINK_LLM || 'deepseek-v4-pro' }}
      TRADINGAGENTS_QUICK_THINK_LLM: ${{ vars.TRADINGAGENTS_QUICK_THINK_LLM || 'deepseek-v4-flash' }}
      TRADINGAGENTS_LLM_BACKEND_URL: ${{ vars.TRADINGAGENTS_LLM_BACKEND_URL }}
      TRADINGAGENTS_OUTPUT_LANGUAGE: ${{ vars.TRADINGAGENTS_OUTPUT_LANGUAGE || '中文' }}
      TRADINGAGENTS_ANALYSTS: ${{ vars.TRADINGAGENTS_ANALYSTS || 'market,news,fundamentals' }}
      # ── 各家 LLM 密钥透传（只需配置与 provider 匹配的那一个）────
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      DASHSCOPE_CN_API_KEY: ${{ secrets.DASHSCOPE_CN_API_KEY }}
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      ZHIPU_CN_API_KEY: ${{ secrets.ZHIPU_CN_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # ── 可选数据源密钥 ───────────────────────────────────────────
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      # ── 微信推送 ────────────────────────────────────────────────
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PAGES_URL: https://tradingagents-board.pages.dev/
      ENABLE_GITHUB_PAGES: ${{ vars.ENABLE_GITHUB_PAGES || 'false' }}
      # ── Cloudflare 国内镜像（配置 CLOUDFLARE_API_TOKEN 后自动启用）──
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'tradingagents-board' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch 的 GITHUB_SHA 固定在触发时刻；排队后开跑时 main 可能已
          # 被前一个 run 提交过数据，必须检出运行时的最新分支头
          ref: main

      - name: Resolve daily ticker list
        env:
          MANUAL_TICKERS: ${{ inputs.tickers || '' }}
          MONITOR_PROFILE_ID: ${{ inputs.profileId || '' }}
          MONITOR_SLOT_ID: ${{ inputs.slotId || '' }}
          MONITOR_SCHEDULED_FOR: ${{ inputs.scheduledFor || '' }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFile, readFile } from "node:fs/promises";
          import {
            normalizeWorkbenchTickers,
            parseWorkbenchSettings,
          } from "./functions/api/_workbench_settings.mjs";

          const manual = process.env.MANUAL_TICKERS.trim();
          let tickers;
          if (manual) {
            tickers = normalizeWorkbenchTickers(manual);
            console.log("using workflow_dispatch ticker override");
          } else {
            const raw = await readFile("public/data/workbench-settings.json", "utf8");
            tickers = parseWorkbenchSettings(JSON.parse(raw)).tickers;
            console.log("using saved workbench ticker list");
          }
          const value = tickers.join(",");
          await appendFile(process.env.GITHUB_ENV, `TRADINGAGENTS_TICKERS=${value}\n`, "utf8");
          console.log(`resolved tickers: ${value}`);
          NODE

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run multi-agent analysis
        run: |
          python scripts/run_daily.py

      - name: Persist reports to main
        run: |
          bash scripts/persist_reports.sh "chore(data): 更新分析报告 $(date -u +%F) [skip ci]"

      - name: Setup Pages
        if: ${{ env.ENABLE_GITHUB_PAGES == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        if: ${{ env.ENABLE_GITHUB_PAGES == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: ${{ env.ENABLE_GITHUB_PAGES == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report GitHub Pages policy
        if: ${{ env.ENABLE_GITHUB_PAGES != 'true' }}
        run: echo "::notice::GitHub Pages is disabled; the Cloudflare Pages production site remains authoritative."

      - name: Deploy CN mirror to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          npm install -g wrangler
          wrangler pages deploy public --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main

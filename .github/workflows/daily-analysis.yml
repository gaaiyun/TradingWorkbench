name: daily-analysis

on:
  schedule:
    # 美股收盘后（21:00 UTC 冬令时 / 20:00 夏令时收盘），21:35 统一覆盖两种情况
    - cron: "35 21 * * 1-5"
  workflow_dispatch:
    inputs:
      tickers:
        description: "逗号分隔的股票代码（留空用仓库变量 TRADINGAGENTS_TICKERS，默认 SPY,NVDA）"
        required: false
        default: ""

permissions:
  contents: write   # 分析报告与历史 commit 回 main 持久化
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHONIOENCODING: utf-8
      # ── LLM 后端（仓库 Variables 可覆盖）─────────────────────────
      TRADINGAGENTS_LLM_PROVIDER: ${{ vars.TRADINGAGENTS_LLM_PROVIDER || 'deepseek' }}
      TRADINGAGENTS_DEEP_THINK_LLM: ${{ vars.TRADINGAGENTS_DEEP_THINK_LLM || 'deepseek-v4-pro' }}
      TRADINGAGENTS_QUICK_THINK_LLM: ${{ vars.TRADINGAGENTS_QUICK_THINK_LLM || 'deepseek-v4-flash' }}
      TRADINGAGENTS_LLM_BACKEND_URL: ${{ vars.TRADINGAGENTS_LLM_BACKEND_URL }}
      TRADINGAGENTS_OUTPUT_LANGUAGE: ${{ vars.TRADINGAGENTS_OUTPUT_LANGUAGE || '中文' }}
      TRADINGAGENTS_TICKERS: ${{ inputs.tickers || vars.TRADINGAGENTS_TICKERS || 'SPY,NVDA' }}
      TRADINGAGENTS_ANALYSTS: ${{ vars.TRADINGAGENTS_ANALYSTS || 'market,news,fundamentals' }}
      # ── 各家 LLM 密钥透传（只需配置与 provider 匹配的那一个）────
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      DASHSCOPE_CN_API_KEY: ${{ secrets.DASHSCOPE_CN_API_KEY }}
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      ZHIPU_CN_API_KEY: ${{ secrets.ZHIPU_CN_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # ── 可选数据源密钥 ───────────────────────────────────────────
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      # ── 微信推送 ────────────────────────────────────────────────
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PAGES_URL: https://tradingagents-board.pages.dev/
      # ── Cloudflare 国内镜像（配置 CLOUDFLARE_API_TOKEN 后自动启用）──
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'tradingagents-board' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run multi-agent analysis
        run: |
          python scripts/run_daily.py

      - name: Persist reports to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data public/reports
          if git diff --cached --quiet; then
            echo "no report changes"
          else
            git commit -m "chore(data): 更新分析报告 $(date -u +%F) [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy CN mirror to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          npm install -g wrangler
          wrangler pages deploy public --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main

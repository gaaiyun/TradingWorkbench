name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pages-functions-test:
    name: Pages Functions unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test Pages Functions contracts
        run: |
          npm run test:functions
          npm run test:frontend
          npm run check:workbench

  workbench-e2e:
    name: Workbench browser flows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium
      - name: Run browser acceptance
        env:
          WORKBENCH_SCREENSHOT_DIR: test-results/workbench
        run: python tests/e2e_workbench.py
      - name: Upload browser snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workbench-browser-snapshots
          path: test-results/workbench

  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run test suite
        run: pytest -q

  smoke-install:
    name: clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fresh install (no dev extras) and import
        run: |
          python -m pip install --upgrade pip
          pip install .
          # Catches undeclared runtime deps (e.g. #994 python-dotenv): a bare
          # install must import the package and the CLI module.
          python -c "import tradingagents, cli.main; print('clean-install import OK')"

  lint:
    name: ruff (strict, full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.15"
      - name: Lint the repository
        # The repo is fully clean under the strict select, so we lint everything
        # (results/ and worklog/ are excluded via pyproject extend-exclude).
        run: ruff check .

name: settings-update

on:
  workflow_dispatch:
    inputs:
      settings_json:
        description: "待保存的工作台 v2 设置 JSON"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: settings-update
  cancel-in-progress: false

jobs:
  persist-settings:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate requested settings
        env:
          REQUESTED_SETTINGS_JSON: ${{ inputs.settings_json }}
        run: |
          node --input-type=module <<'NODE'
          import { writeFile } from "node:fs/promises";
          import { buildWorkbenchSettings } from "./functions/api/_workbench_settings.mjs";

          let requested;
          try {
            requested = JSON.parse(process.env.REQUESTED_SETTINGS_JSON);
          } catch {
            throw new Error("settings_json 不是合法 JSON");
          }
          const settings = buildWorkbenchSettings(requested);
          const target = `${process.env.RUNNER_TEMP}/workbench-settings.json`;
          await writeFile(target, `${JSON.stringify(settings, null, 2)}\n`, "utf8");
          console.log(`validated tickers: ${settings.tickers.join(",")}`);
          NODE

      - name: Overlay onto latest main and persist
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p public/data
            cp "$RUNNER_TEMP/workbench-settings.json" public/data/workbench-settings.json
            git add public/data/workbench-settings.json

            if git diff --cached --quiet; then
              echo "[settings] no changes"
              exit 0
            fi

            git commit -m "chore(settings): 更新每日分析清单 [skip ci]"
            if git push origin main; then
              echo "[settings] pushed (attempt $attempt)"
              exit 0
            fi
            echo "[settings] push raced with another data update; retrying ($attempt)"
            sleep "$attempt"
          done

          echo "[settings] FAILED after 5 attempts" >&2
          exit 1
